name: Resumen diario de noticias

on:
  schedule:
    # cron en UTC. 11:00 UTC = 08:00 en Chile (horario de verano, UTC-3).
    # En invierno (UTC-4) llegará a las 07:00. Ajusta el número si quieres otra hora.
    - cron: "0 11 * * *"
  workflow_dispatch:   # permite ejecutarlo manualmente desde la pestaña Actions

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar agente
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python news_agent.py

